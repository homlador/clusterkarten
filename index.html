<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clusterbildung visualisiert mit Kartendateien</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="app" class="log--collapsed">
      <aside id="panel"></aside>
      <div id="log-panel" class="log-panel"></div>
      <main id="map"></main>
      <footer id="controls"></footer>

      <div id="scenario-banner" class="scenario-banner">
        <div class="scenario-banner__header">
          <h1 class="scenario-banner__name" id="banner-name"></h1>
          <span class="scenario-banner__algo-badge" id="banner-algo"></span>
          <button class="scenario-banner__info-btn" id="banner-info-btn" title="Beschreibung anzeigen">ⓘ</button>
        </div>
        <p class="scenario-banner__task" id="banner-task"></p>
        <p class="scenario-banner__desc" id="banner-desc" hidden></p>
      </div>
      <a href="https://github.com/homlador/clusterkarten" target="_blank" rel="noopener noreferrer"
         class="github-link" title="GitHub Repository">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12"/>
        </svg>
      </a>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
    <script type="module">
      import { App } from './src/App.js';
      const app = new App(
        document.getElementById('panel'),
        document.getElementById('map'),
        document.getElementById('controls'),
        document.getElementById('log-panel'),
      );
      app.init().catch(err => console.error('Initialisierungsfehler:', err));
    </script>
  </body>
</html>
